global
#   nbthread 1
    maxconn 5000
    hard-stop-after 10s
#   log localhost:514 local7 debug
#   debug

defaults
#   log     global
#   option  httplog
#   option  dontlognull
#   option  httpclose
    mode    http
    retries 3
    maxconn 4000
    timeout connect 5000
    timeout client  50000
    timeout server  50000
